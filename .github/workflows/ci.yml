name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble

    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Show versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 5

      - name: Show Playwright version
        run: npx --no-install playwright --version

      - name: Run unit tests
        run: npm run test
        timeout-minutes: 5

      - name: Build production bundle
        run: npm run build
        timeout-minutes: 5

      - name: Run end-to-end tests
        run: npm run test:e2e
        timeout-minutes: 10

      - name: Audit dependencies
        run: npm run audit
        timeout-minutes: 5